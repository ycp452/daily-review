name: Daily Scraper

on:
  schedule:
    - cron: '0 14 * * *' # Run at 01:00 UTC every day
  workflow_dispatch: # Allow manual trigger with custom inputs
    inputs:
      date:
        description: 'Date to scrape (YYYY-MM-DD)'
        required: false
        default: ''
      url:
        description: 'Direct DW Article URL'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Scraper
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            # Manual run with specific date
            uv run scraper/dw_scraper.py --date ${{ github.event.inputs.date }}
          elif [ -n "${{ github.event.inputs.url }}" ]; then
            # Manual run with specific URL
            uv run scraper/dw_scraper.py --url ${{ github.event.inputs.url }}
          else
            # Scheduled run: try both yesterday and today to handle timezone gaps
            YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
            TODAY=$(date +%Y-%m-%d)
            echo "Scraping yesterday: $YESTERDAY"
            uv run scraper/dw_scraper.py --date $YESTERDAY
            echo "Scraping today: $TODAY"
            uv run scraper/dw_scraper.py --date $TODAY
          fi
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: nightly article update" && git push)
