name: Daily DW Scraper

on:
  schedule:
    - cron: '0 1 * * *' # Run at 01:00 UTC every day
  workflow_dispatch: # Allow manual trigger with custom inputs
    inputs:
      date:
        description: 'Date to scrape (YYYY-MM-DD)'
        required: false
        default: ''
      url:
        description: 'Direct DW Article URL'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Scraper
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then ARGS="$ARGS --date ${{ github.event.inputs.date }}"; fi
          if [ -n "${{ github.event.inputs.url }}" ]; then ARGS="$ARGS --url ${{ github.event.inputs.url }}"; fi
          uv run scraper/dw_scraper.py $ARGS
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: nightly article update" && git push)
